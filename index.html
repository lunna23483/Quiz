<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Meme Programador 🤪</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DYBX85Q6KM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DYBX85Q6KM', { send_page_view: true });
</script>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #ff4ecd);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* Pregunta grande */
.pregunta-grande {
    font-size: 40px;
    max-width: 90%;
    margin-bottom: 30px;
    font-weight: bold;
}

/* Card */
.card {
    background: rgba(0,0,0,0.5);
    border: 4px solid #00e5ff;
    box-shadow: 0 0 40px #00e5ff;
    padding: 30px;
    border-radius: 30px;
    width: 600px;
    max-width: 90%;
}

/* Botones */
button {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
}

button:hover { opacity: 0.9; }

.boton-musica {
    background: linear-gradient(45deg,#00e5ff,#ff4ecd);
    color: black;
    font-weight: bold;
}

.correct { background: #2ecc71; }
.wrong { background: #e74c3c; }

/* Emoji */
.emoji {
    font-size: 150px;
    margin-top: 30px;
    animation: flotar 1s ease;
}

/* Animación */
@keyframes flotar {
    0% { transform: scale(0.7) translateY(40px); opacity: 0; }
    50% { transform: scale(1.2) translateY(-10px); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

/* Responsive */
@media (max-width: 900px) {
    .pregunta-grande { font-size: 32px; }
    .card { width: 95vw; }
    button { font-size: 22px; padding: 20px; }
    .emoji { font-size: 200px; }
}
</style>
</head>

<body>

<div class="pregunta-grande" id="pregunta"></div>

<div class="card">
    <button class="boton-musica" onclick="toggleMusica()">🎵 Reproducir música</button>
    <div id="opciones"></div>
</div>

<div class="emoji" id="emoji">🤔</div>

<audio id="musica" loop>
    <source src="amarillo.mp3" type="audio/mpeg">
</audio>

<script>
gtag('event','visita_quiz');

const musica = document.getElementById("musica");
let reproduciendo = false;
let primerToque = false;

/* Autoplay real en móvil */
document.body.addEventListener("click", function iniciarMusica() {
    if (!primerToque) {
        musica.play();
        reproduciendo = true;
        document.querySelector(".boton-musica").textContent = "⏸ Pausar música";
        primerToque = true;
        gtag('event','autoplay_musica');
        document.body.removeEventListener("click", iniciarMusica);
    }
});

/* Botón manual */
function toggleMusica() {
    const boton = document.querySelector(".boton-musica");

    if (!reproduciendo) {
        musica.play();
        boton.textContent = "⏸ Pausar música";
        reproduciendo = true;
        gtag('event','play_musica');
    } else {
        musica.pause();
        boton.textContent = "🎵 Reproducir música mientras juegas";
        reproduciendo = false;
        gtag('event','pausa_musica');
    }
}

/* Preguntas */
const preguntasOriginales = [
{ emoji:"🤯", p:"¿Qué hace un programador cuando el código funciona?", o:["Llora","No lo toca jamás","Borra todo"], r:1 },
{ emoji:"😂", p:"¿Qué significa 'funciona en mi máquina'?", o:["Es magia","Tu problema","Bug fantasma"], r:1 },
{ emoji:"☕", p:"Cuál es el verdadero combustible del código?", o:["Electricidad","Café","Errores"], r:1 },
{ emoji:"💀", p:"¿Qué pasa si borras una línea random?", o:["Nada","Todo explota","Se arregla solo"], r:1 },
{ emoji:"🤡", p:"¿Cuántas horas toma arreglar un bug?", o:["5 minutos","2 días","Depende del ego"], r:2 },
{ emoji:"🧠", p:"¿Dónde vive la mayoría de bugs?", o:["En el teclado","En la lógica","En producción"], r:2 },
{ emoji:"😴", p:"¿El programador duerme?", o:["Sí","No","Error 404"], r:2 },
{ emoji:"🔥", p:"¿Cuál es el mejor debugger?", o:["console.log()","Rezar","Gritar"], r:0 },
{ emoji:"🫠", p:"¿Qué sientes cuando el error desaparece solo?", o:["Felicidad","Miedo","Desconfianza"], r:2 },
{ emoji:"😵‍💫", p:"¿Qué rompe más código?", o:["Un junior","Un update","Un 'arreglito rápido'"], r:2 },
{ emoji:"🧪", p:"¿Dónde se prueba el código?", o:["Local","Staging","Producción"], r:2 },
{ emoji:"📦", p:"¿Qué es un bug?", o:["Un error","Una feature","Un susto"], r:1 },
{ emoji:"😈", p:"¿Quién rompió el código?", o:["Yo","Git","El compañero"], r:0 },
{ emoji:"🧻", p:"¿Para qué sirve la documentación?", o:["Para leer","Para decorar","Para ignorar"], r:2 },
{ emoji:"🚀", p:"¿Cuándo funciona todo perfecto?", o:["Nunca","Antes del deploy","En sueños"], r:2 }
];

let preguntas = [];
let actual = {};
let puntuacion = 0;
let indice = 0;

function iniciarJuego() {
    preguntas = [...preguntasOriginales].sort(() => Math.random() - 0.5);
    puntuacion = 0;
    indice = 0;
    nuevaPregunta();
}

function nuevaPregunta() {

    if (indice >= preguntas.length) {
        mostrarResultado();
        return;
    }

    actual = preguntas[indice];
    indice++;

    document.getElementById("pregunta").textContent = actual.p;

    const emojiEl = document.getElementById("emoji");
    emojiEl.textContent = actual.emoji;
    emojiEl.style.animation = "none";
    void emojiEl.offsetWidth;
    emojiEl.style.animation = "flotar 0.8s ease";

    gtag('event','nueva_pregunta',{numero:indice});

    const cont = document.getElementById("opciones");
    cont.innerHTML = "";

    actual.o.forEach((op,i)=>{
        const btn = document.createElement("button");
        btn.textContent = op;
        btn.onclick = ()=> validar(i);
        cont.appendChild(btn);
    });
}

function validar(i){
    const correcta = i === actual.r;
    gtag('event','respuesta',{correcta:correcta});
    if(correcta) puntuacion++;
    setTimeout(()=> nuevaPregunta(),700);
}

function mostrarResultado(){
    gtag('event','quiz_terminado',{puntuacion:puntuacion});

    document.getElementById("pregunta").innerHTML =
        `🏆 Terminaste! <br> Puntuación: ${puntuacion} / ${preguntas.length}`;

    document.getElementById("opciones").innerHTML =
        `<button onclick="iniciarJuego()">🔄 Jugar otra vez</button>`;

    document.getElementById("emoji").textContent =
        puntuacion >= 12 ? "🏆" :
        puntuacion >= 8 ? "😎" :
        "🤡";
}

iniciarJuego();
</script>

</body>
</html>
